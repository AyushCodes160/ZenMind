<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Alpha</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: oklch(20% 0.02 60); display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }
  body { overflow: hidden; }

  :root {
    --cream: oklch(97% 0.012 75);
    --cream-2: oklch(93% 0.018 72);
    --cream-3: oklch(89% 0.022 70);
    --sage: oklch(56% 0.09 155);
    --sage-light: oklch(88% 0.05 155);
    --terra: oklch(62% 0.10 42);
    --terra-light: oklch(90% 0.05 42);
    --rose: oklch(70% 0.07 10);
    --rose-light: oklch(92% 0.04 10);
    --text-dark: oklch(22% 0.025 60);
    --text-mid: oklch(45% 0.03 65);
    --text-light: oklch(62% 0.025 65);
    --border: oklch(87% 0.02 70);
  }

  .app-shell {
    width: 390px;
    height: 844px;
    background: var(--cream);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 48px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 0;
    flex-shrink: 0;
    z-index: 10;
    position: relative;
  }
  .status-time { font-size: 15px; font-weight: 600; color: var(--text-dark); letter-spacing: -0.3px; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; fill: var(--text-dark); }

  /* Scroll container */
  .screen-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .screen-scroll::-webkit-scrollbar { display: none; }

  /* Bottom Nav */
  .bottom-nav {
    height: 78px;
    background: var(--cream);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding-top: 10px;
    flex-shrink: 0;
    z-index: 10;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px 0;
    transition: opacity 0.2s;
  }
  .nav-item:active { opacity: 0.6; }
  .nav-icon {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-light);
    letter-spacing: 0.2px;
  }
  .nav-item.active .nav-label { color: var(--sage); }
  .nav-item.active .nav-dot {
    width: 4px; height: 4px; border-radius: 2px;
    background: var(--sage);
    margin-top: 2px;
  }

  /* ---- HOME SCREEN ---- */
  .home-header {
    padding: 20px 24px 0;
  }
  .home-greeting {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-light);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .home-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 500;
    color: var(--text-dark);
    line-height: 1.1;
  }
  .home-name em { font-style: italic; color: var(--sage); }

  .breathe-card {
    margin: 20px 24px 0;
    background: linear-gradient(135deg, oklch(38% 0.08 155), oklch(28% 0.06 170));
    border-radius: 24px;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
  }
  .breathe-card-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: oklch(80% 0.05 155);
    margin-bottom: 10px;
  }
  .breathe-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    color: white;
    margin-bottom: 6px;
  }
  .breathe-card-sub {
    font-size: 13px;
    color: oklch(82% 0.04 155);
    margin-bottom: 20px;
  }
  .breathe-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: white;
    color: oklch(38% 0.08 155);
    border: none;
    border-radius: 50px;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .breathe-orb {
    position: absolute;
    right: -20px;
    top: -20px;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: oklch(50% 0.07 155 / 0.3);
    animation: orbPulse 4s ease-in-out infinite;
  }
  .breathe-orb2 {
    position: absolute;
    right: 20px;
    top: 20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: oklch(60% 0.06 155 / 0.2);
    animation: orbPulse 4s ease-in-out infinite 1s;
  }
  @keyframes orbPulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 24px 12px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--text-dark);
  }
  .section-link {
    font-size: 12px;
    font-weight: 500;
    color: var(--sage);
    cursor: pointer;
    letter-spacing: 0.3px;
  }

  .features-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 24px;
  }
  .feature-card {
    border-radius: 20px;
    padding: 20px 18px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    min-height: 110px;
  }
  .feature-card:active { transform: scale(0.97); }
  .feature-card.sage { background: var(--sage-light); }
  .feature-card.terra { background: var(--terra-light); }
  .feature-card.rose { background: var(--rose-light); }
  .feature-card.cream { background: var(--cream-3); }
  .feature-icon {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }
  .feature-card.sage .feature-icon { background: oklch(56% 0.09 155 / 0.2); }
  .feature-card.terra .feature-icon { background: oklch(62% 0.10 42 / 0.2); }
  .feature-card.rose .feature-icon { background: oklch(70% 0.07 10 / 0.2); }
  .feature-card.cream .feature-icon { background: oklch(75% 0.04 70 / 0.3); }
  .feature-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.3;
  }
  .feature-sub {
    font-size: 11px;
    color: var(--text-mid);
    margin-top: 3px;
  }

  .quote-strip {
    margin: 20px 24px;
    background: var(--cream-2);
    border-radius: 20px;
    padding: 20px;
    border-left: 3px solid var(--terra);
  }
  .quote-strip-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 8px;
  }
  .quote-strip-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--text-dark);
    line-height: 1.5;
  }
  .quote-strip-author {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 8px;
  }

  /* ---- THERAPIST SCREEN ---- */
  .page-header {
    padding: 16px 24px 20px;
    border-bottom: 1px solid var(--border);
  }
  .page-back {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--sage);
    cursor: pointer;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 500;
    color: var(--text-dark);
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--text-light);
    margin-top: 4px;
  }

  .therapist-banner {
    margin: 20px 24px 0;
    background: linear-gradient(135deg, oklch(88% 0.06 42), oklch(92% 0.04 30));
    border-radius: 20px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .therapist-avatar-wrap {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: oklch(75% 0.08 42 / 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .therapist-banner-text .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-dark);
  }
  .therapist-banner-text .role {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 2px;
  }
  .therapist-banner-text .status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--sage);
    font-weight: 500;
    margin-top: 6px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--sage);
  }

  .session-types {
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .session-type-card {
    background: var(--cream-2);
    border-radius: 18px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: background 0.2s;
    border: 1.5px solid transparent;
  }
  .session-type-card:active { background: var(--cream-3); }
  .session-type-card.selected { border-color: var(--sage); background: var(--sage-light); }
  .session-type-icon {
    width: 44px; height: 44px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .session-type-icon.live { background: var(--sage-light); }
  .session-type-icon.async { background: var(--terra-light); }
  .session-type-text .st-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dark);
  }
  .session-type-text .st-desc {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 2px;
  }
  .st-arrow {
    margin-left: auto;
    color: var(--text-light);
  }

  .therapist-list { padding: 0 24px; display: flex; flex-direction: column; gap: 12px; }
  .therapist-card {
    background: var(--cream-2);
    border-radius: 18px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
  }
  .t-avatar {
    width: 50px; height: 50px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: white;
  }
  .t-info .t-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dark);
  }
  .t-info .t-spec {
    font-size: 12px;
    color: var(--text-mid);
    margin-top: 1px;
  }
  .t-info .t-rating {
    font-size: 11px;
    color: var(--terra);
    margin-top: 4px;
    font-weight: 500;
  }
  .t-btn {
    margin-left: auto;
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ---- COMMUNITY SCREEN ---- */
  .community-search {
    margin: 16px 24px;
    background: var(--cream-2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
  }
  .community-search input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    outline: none;
  }
  .community-search input::placeholder { color: var(--text-light); }

  .community-tags {
    display: flex;
    gap: 8px;
    padding: 0 24px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .community-tags::-webkit-scrollbar { display: none; }
  .tag {
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
  }
  .tag.active { background: var(--sage); color: white; }
  .tag.inactive { background: var(--cream-2); color: var(--text-mid); }

  .community-posts { padding: 0 24px; display: flex; flex-direction: column; gap: 14px; }
  .post-card {
    background: var(--cream-2);
    border-radius: 20px;
    padding: 18px 20px;
  }
  .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .post-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: white;
    flex-shrink: 0;
  }
  .post-meta .p-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
  .post-meta .p-time { font-size: 11px; color: var(--text-light); margin-top: 1px; }
  .post-tag {
    margin-left: auto;
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .post-body {
    font-size: 14px;
    color: var(--text-dark);
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .post-actions { display: flex; gap: 16px; }
  .post-action {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text-light);
    cursor: pointer;
    font-weight: 500;
  }
  .post-action.liked { color: var(--rose); }

  /* ---- QUOTES SCREEN ---- */
  .quotes-main-card {
    margin: 16px 24px 0;
    background: linear-gradient(160deg, oklch(28% 0.06 170), oklch(38% 0.09 155));
    border-radius: 28px;
    padding: 36px 28px;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .quotes-deco {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: 180px;
    font-style: italic;
    color: white;
    opacity: 0.05;
    top: -30px;
    left: 10px;
    line-height: 1;
    user-select: none;
  }
  .quote-main-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-style: italic;
    color: white;
    line-height: 1.45;
    font-weight: 300;
    position: relative;
    z-index: 1;
  }
  .quote-main-author {
    font-size: 13px;
    color: oklch(80% 0.05 155);
    font-weight: 500;
    position: relative;
    z-index: 1;
    margin-top: 20px;
  }
  .quote-actions {
    display: flex;
    gap: 10px;
    margin: 16px 24px 0;
  }
  .quote-action-btn {
    flex: 1;
    padding: 13px;
    border-radius: 14px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .quote-action-btn.primary { background: var(--sage); color: white; }
  .quote-action-btn.secondary { background: var(--cream-2); color: var(--text-dark); }

  .quotes-list { padding: 0 24px; display: flex; flex-direction: column; gap: 12px; }
  .quote-list-item {
    background: var(--cream-2);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    cursor: pointer;
  }
  .quote-list-bar {
    width: 3px;
    border-radius: 2px;
    flex-shrink: 0;
    align-self: stretch;
  }
  .quote-list-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--text-dark);
    line-height: 1.5;
  }
  .quote-list-author { font-size: 11px; color: var(--text-light); margin-top: 5px; font-weight: 500; }

  /* ---- VIDEOS SCREEN ---- */
  .featured-video {
    margin: 16px 24px 0;
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    height: 200px;
    cursor: pointer;
    background: linear-gradient(160deg, oklch(25% 0.04 60), oklch(35% 0.06 70));
  }
  .video-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
  }
  .video-play-btn {
    width: 52px; height: 52px; border-radius: 50%;
    background: white;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px black/30%;
  }
  .video-overlay-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: oklch(80% 0.03 60);
    font-weight: 500;
  }
  .video-overlay-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: white;
    font-weight: 400;
    text-align: center;
    padding: 0 20px;
  }
  .video-duration {
    position: absolute;
    bottom: 14px;
    right: 16px;
    background: black/40%;
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .video-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 24px;
  }
  .video-thumb {
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  .video-thumb-bg {
    height: 110px;
    display: flex; align-items: center; justify-content: center;
  }
  .video-thumb-play {
    width: 36px; height: 36px; border-radius: 50%;
    background: white/80%;
    display: flex; align-items: center; justify-content: center;
  }
  .video-thumb-info {
    background: var(--cream-2);
    padding: 10px 12px;
  }
  .video-thumb-title { font-size: 13px; font-weight: 600; color: var(--text-dark); line-height: 1.3; }
  .video-thumb-meta { font-size: 11px; color: var(--text-light); margin-top: 3px; }

  /* ---- MEDITATION SCREEN ---- */
  .breathe-exercise {
    margin: 16px 24px 0;
    background: linear-gradient(135deg, oklch(88% 0.05 42), oklch(92% 0.04 55));
    border-radius: 28px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .breathe-ring-outer {
    width: 120px; height: 120px; border-radius: 50%;
    border: 2px solid oklch(62% 0.10 42 / 0.3);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    margin-bottom: 20px;
    animation: breatheRing 6s ease-in-out infinite;
  }
  .breathe-ring-inner {
    width: 84px; height: 84px; border-radius: 50%;
    background: oklch(62% 0.10 42 / 0.15);
    border: 2px solid oklch(62% 0.10 42 / 0.4);
    display: flex; align-items: center; justify-content: center;
    animation: breatheRing 6s ease-in-out infinite 0.5s;
  }
  .breathe-center {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--terra);
    display: flex; align-items: center; justify-content: center;
    animation: breatheRing 6s ease-in-out infinite 1s;
  }
  @keyframes breatheRing {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  .breathe-instruction {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;

    { from: "ai", text: "Hello, I'm Zen — your AI wellness companion. I'm here to listen without judgment, help you process your feelings, and guide you through difficult moments. How are you feeling today?" }
  ]);
  const [input, setInput] = useState("");

  const [mood, setMood] = useState(null);
  const moods = ["😔", "😟", "😐", "🙂", "😊"];
  const scrollRef = React.useRef(null);

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(m => [...m, { from: "user", text: userMsg }]);
    setLoading(true);
    try {
      const history = messages.map(m => ({ role: m.from === "ai" ? "assistant" : "user", content: m.text }));
      history.push({ role: "user", content: userMsg });
      const reply = await window.claude.complete({
        messages: [
          { role: "user", content: `You are Zen, a compassionate AI wellness companion inside a meditation and mental wellness app called Zen Alpha. You offer empathetic, supportive, non-judgmental responses to help users process emotions and feel heard. Keep responses warm, concise (2–3 sentences), and grounded. Never give medical diagnoses. Always validate feelings first before any suggestion.\n\nUser message: ${userMsg}` }
        ]
      });
      setMessages(m => [...m, { from: "ai", text: reply }]);
    } catch(e) {
      setMessages(m => [...m, { from: "ai", text: "I'm here with you. Take your time — whenever you're ready, I'm listening." }]);
    }
    setLoading(false);
  };

  React.useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages, loading]);

  return (
    <div className="screen-enter" style={{display:"flex",flexDirection:"column",height:"100%"}}>

          <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
            {moods.map((m, i) => (
              <button key={i} onClick={() => {
                setMood(i);
                const labels = ["really low","anxious","okay","pretty good","great"];
                setMessages(msgs => [...msgs, {from:"user",text:`I'm feeling ${labels[i]} today.`},{from:"ai",text:i < 2 ? `I'm really glad you're here. Feeling ${labels[i]} can be really heavy — you don't have to carry that alone. Would you like to talk about what's on your mind?` : i === 2 ? `Being okay is a perfectly valid place to be. Sometimes "okay" is exactly enough. Is there something specific you'd like to explore or work through today?` : `That's wonderful to hear. Even on good days, it's valuable to check in with yourself. What would feel most supportive for you right now?`}]);

            ))}

      <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:"8px 24px",display:"flex",flexDirection:"column",gap:10,scrollbarWidth:"none"}}>

          <div key={i} style={{display:"flex",justifyContent:msg.from==="user"?"flex-end":"flex-start",alignItems:"flex-end",gap:8}}>

              <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,oklch(56% 0.09 155),oklch(42% 0.08 170))",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginBottom:2}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.5"/></svg>

        {loading && (
          <div style={{display:"flex",alignItems:"flex-end",gap:8}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,oklch(56% 0.09 155),oklch(42% 0.08 170))",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.5"/></svg>
            </div>
            <div style={{background:"var(--cream-2)",borderRadius:"18px 18px 18px 4px",padding:"12px 16px",display:"flex",gap:5,alignItems:"center"}}>
              {[0,1,2].map(d => <div key={d} style={{width:6,height:6,borderRadius:"50%",background:"var(--text-light)",animation:`dotBounce 1.2s ease-in-out infinite`,animationDelay:`${d*0.2}s`}}></div>)}
            </div>
          </div>
        )}
      </div>

      <style>{`@keyframes dotBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}`}</style>

      <div style={{padding:"10px 16px 10px",borderTop:"1px solid var(--border)",display:"flex",gap:10,alignItems:"center",background:"var(--cream)"}}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && sendMessage()}
          placeholder="Share what's on your mind…"
          style={{flex:1,background:"var(--cream-2)",border:"none",borderRadius:50,padding:"12px 18px",fontFamily:"'DM Sans',sans-serif",fontSize:14,color:"var(--text-dark)",outline:"none"}}
        />
        <button onClick={sendMessage} disabled={loading || !input.trim()} style={{width:42,height:42,borderRadius:"50%",background:input.trim()?"var(--sage)":"var(--cream-3)",border:"none",cursor:input.trim()?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.2s",flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={input.trim()?"white":"var(--text-light)"} strokeWidth="2" strokeLinecap="round"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>
  );
}

            <div className="post-actions">
              <div className={"post-action" + (likedPosts[p.id] ? " liked" : "")} onClick={() => toggleLike(p.id)}>

function MeditationScreen({ navigate }) {
  const [breathing, setBreathing] = useState(false);
  const [phase, setPhase] = useState("Breathe in…");
  const timerRef = useRef(null);

  const startBreath = () => {
    setBreathing(true);
    const phases = ["Breathe in…", "Hold…", "Breathe out…", "Hold…"];
    let i = 0;
    setPhase(phases[0]);
    timerRef.current = setInterval(() => {
      i = (i + 1) % phases.length;
      setPhase(phases[i]);
    }, 2500);
  };
  const stopBreath = () => {
    setBreathing(false);
    clearInterval(timerRef.current);
    setPhase("Breathe in…");
  };

  return (
    <div className="screen-enter">
      <div className="page-header">
        <div className="page-back" onClick={() => navigate("home")}>{Icons.back()} Home</div>
        <div className="page-title">Meditations</div>
        <div className="page-subtitle">Find stillness within</div>
      </div>

      <div className="breathe-exercise">
        <div className="breathe-ring-outer" style={{animationPlayState: breathing ? "running" : "paused"}}>
          <div className="breathe-ring-inner" style={{animationPlayState: breathing ? "running" : "paused"}}>
            <div className="breathe-center" style={{animationPlayState: breathing ? "running" : "paused"}}>
              {Icons.leaf()}
            </div>
          </div>
        </div>
        <div className="breathe-instruction">{phase}</div>
        <div className="breathe-timer">{breathing ? "Box breathing · 4-4-4-4" : "Tap to begin"}</div>
        <button className="breathe-start-btn" onClick={breathing ? stopBreath : startBreath}>
          {breathing ? "⏸ Pause" : "▶ Start Breathing"}
        </button>
      </div>

      <div className="section-header">
        <div className="section-title">Guided Sessions</div>
        <div className="section-link">See all</div>
      </div>

      <div className="meditation-list">
        {meditations.map(m => (
          <div className="meditation-item" key={m.id}>
            <div className="med-icon" style={{background: m.iconBg}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={m.iconColor} strokeWidth="1.8">
                <circle cx="12" cy="12" r="9"/>
                <circle cx="12" cy="12" r="4"/>
                <circle cx="12" cy="12" r="1.5" fill={m.iconColor} stroke="none"/>
              </svg>
            </div>
            <div className="med-info">
              <div className="med-title">{m.title}</div>
              <div className="med-meta">{m.meta}</div>
              <div className="med-tags">
                {m.tags.map(tag => (
                  <div key={tag} className="med-tag" style={{background:"var(--cream-3)",color:"var(--text-mid)"}}>{tag}</div>
                ))}
              </div>
            </div>
            <div className="med-play" style={{background:"var(--cream-3)"}}>
              {Icons.play("var(--text-mid)", 16)}
            </div>
          </div>
        ))}
      </div>
      <div className="spacer"></div>
    </div>
  );
}

/* ── NAV ── */
const navItems = [
  { id: "home", label: "Home", icon: Icons.home },
  { id: "therapist", label: "Therapist", icon: Icons.therapist },
  { id: "community", label: "Community", icon: Icons.community },
  { id: "videos", label: "Videos", icon: Icons.video },
  { id: "meditation", label: "Meditate", icon: Icons.meditation },
];

/* ── APP ── */
function App() {
  const [screen, setScreen] = useState("home");

  const screens = {
    home: <HomeScreen navigate={setScreen}/>,
    therapist: <TherapistScreen navigate={setScreen}/>,
    community: <CommunityScreen navigate={setScreen}/>,
    quotes: <QuotesScreen navigate={setScreen}/>,
    videos: <VideosScreen navigate={setScreen}/>,
    meditation: <MeditationScreen navigate={setScreen}/>,
  };

  return (
    <div className="app-shell">
      <div className="status-bar">
        <div className="status-time">9:41</div>
        <div className="status-icons">
          <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01" fill="none" stroke="var(--text-dark)" strokeWidth="1.8" strokeLinecap="round"/></svg>
          <svg viewBox="0 0 24 24"><rect x="1" y="6" width="18" height="12" rx="2" fill="none" stroke="var(--text-dark)" strokeWidth="1.8"/><path d="M23 13v-2" stroke="var(--text-dark)" strokeWidth="2" strokeLinecap="round"/><rect x="3" y="8" width="12" height="8" rx="1" fill="var(--text-dark)"/></svg>
        </div>
      </div>

      <div className="screen-scroll" key={screen}>
        {screens[screen]}
      </div>

      <div className="bottom-nav">
        {navItems.map(item => {
          const active = screen === item.id;
          return (
            <div key={item.id} className={"nav-item" + (active ? " active" : "")} onClick={() => setScreen(item.id)}>
              <div className="nav-icon">{item.icon(active)}</div>
              <div className="nav-label">{item.label}</div>
              {active && <div className="nav-dot"></div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
